name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Dependencies
        run: npm install

      - name: Initialize Capacitor Android
        run: |
          npx cap add android
          npx cap sync android

      - name: Sync Version & Force Ultimate Fullscreen
        run: |
          APP_VERSION=$(node -p "require('./package.json').version")
          APP_CODE=$(echo $APP_VERSION | sed 's/\.//g')
          
          sed -i -E "s/versionCode [0-9]+/versionCode $APP_CODE/g" android/app/build.gradle
          sed -i -E "s/versionName \"[^\"]+\"/versionName \"$APP_VERSION\"/g" android/app/build.gradle
          
          cat << 'EOF' > android/app/src/main/java/com/baca/reader/MainActivity.java
          package com.baca.reader;
          import android.os.Bundle;
          import android.view.WindowManager;
          import com.getcapacitor.BridgeActivity;
          
          public class MainActivity extends BridgeActivity {
              @Override
              public void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  getWindow().setFlags(WindowManager.LayoutParams.FLAG_LAYOUT_NO_LIMITS, WindowManager.LayoutParams.FLAG_LAYOUT_NO_LIMITS);
                  if (android.os.Build.VERSION.SDK_INT >= android.os.Build.VERSION_CODES.P) {
                      getWindow().getAttributes().layoutInDisplayCutoutMode = WindowManager.LayoutParams.LAYOUT_IN_DISPLAY_CUTOUT_MODE_SHORT_EDGES;
                  }
              }
          }
          EOF

      - name: Download Permanent Keystore
        run: |
          # Download KTP abadi langsung ke root folder project
          wget https://raw.githubusercontent.com/expo/expo/main/templates/expo-template-bare-minimum/android/app/debug.keystore -O debug.keystore

      - name: Generate Android Icons
        run: npx @capacitor/assets generate --android

      - name: Build APK (Gradle)
        run: |
          cd android
          chmod +x gradlew
          # PERBAIKAN MUTLAK DI SINI: Pakai Alamat Absolut (${{ github.workspace }})
          # Biar semua sub-plugin ga nyasar pas nyari file KTP
          ./gradlew assembleDebug -Pandroid.injected.signing.store.file=${{ github.workspace }}/debug.keystore -Pandroid.injected.signing.store.password=android -Pandroid.injected.signing.key.alias=androiddebugkey -Pandroid.injected.signing.key.password=android

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Baca-App-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk


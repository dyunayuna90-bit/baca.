name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate Fixed Keystore
        run: |
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "C=US, O=Android, CN=Android Debug"

      - name: Install Dependencies
        run: npm install

      - name: Initialize Capacitor Android
        run: |
          npx cap add android
          npx cap sync android

      - name: Sync Version & Force Fullscreen
        run: |
          # Ambil angka versi murni dari package.json lu
          APP_VERSION=$(node -p "require('./package.json').version")
          # Ilangin titiknya buat kode rahasia Android (Misal: 1.0.1 jadi 101)
          APP_CODE=$(echo $APP_VERSION | sed 's/\.//g')
          
          # Suntik versinya ke jantung Android
          sed -i "s/versionCode 1/versionCode $APP_CODE/g" android/app/build.gradle
          sed -i "s/versionName \"1.0\"/versionName \"$APP_VERSION\"/g" android/app/build.gradle
          
          # Jebol poni layar (Notch) & ilangin tembok warna
          sed -i '/<style name="AppTheme.NoActionBar"/a \        <item name="android:windowLayoutInDisplayCutoutMode">shortEdges</item>' android/app/src/main/res/values/styles.xml
          sed -i '/<style name="AppTheme.NoActionBar"/a \        <item name="android:statusBarColor">@android:color/transparent</item>' android/app/src/main/res/values/styles.xml

      - name: Generate Android Icons
        run: npx @capacitor/assets generate --android

      - name: Build APK (Gradle)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Baca-App-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
